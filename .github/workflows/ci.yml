name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fan the suite out across parallel shards; each shard authenticates as its own pooled
  # account (per-shard user distribution — see utils/userIdentity.ts).
  test:
    name: Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            user: standard_user
          - shard: 2
            user: performance_glitch_user
          - shard: 3
            user: standard_user

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests (sharded)
        env:
          PW_USER: ${{ matrix.user }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: npx playwright test --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 3

  # Merge every shard into one HTML report, export Excel + PDF summaries, and email them.
  report:
    name: Merge, export & notify
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Merge into JSON results
        run: |
          mkdir -p test-results
          npx playwright merge-reports --reporter json ./all-blob-reports > test-results/results.json

      - name: Export Excel + PDF summaries
        run: npm run export:report

      - name: Email the report (skipped unless SMTP secrets are set)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm run email:report

      - name: Upload HTML report + summaries
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            reports/
          retention-days: 14
